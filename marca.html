<script>
  (function () {
    const slug = new URLSearchParams(location.search).get('m');
    const brand = BRANDS[slug];
    if (!brand) {
      location.replace('porfolio.html');
      return;
    }
    document.title = brand.name + ' — (al)²cuadrado';
    document.getElementById('marca-nombre').textContent = brand.name;
    document.getElementById('marca-desc').textContent = brand.desc;
    const gallery = document.getElementById('marca-gallery');
    brand.images.forEach((file, i) => {
      const img = document.createElement('img');
      img.src = 'assets/img/' + slug + '/' + file;
      img.alt = brand.name + ' — ' + brand.tag;
      img.loading = i > 1 ? 'lazy' : 'eager';
      if (i === 0 && brand.images.length % 2 === 1) img.classList.add('wide');
      gallery.appendChild(img);
    });
  })();
</script>
